services:
  redis:
    image: redis:8.0-rc1
    volumes:
      - redis_data:/data
  python:
    image: agenttinker:1
    working_dir: /app
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - CHAINLIT_AUTH_SECRET=${CHAINLIT_AUTH_SECRET}
      - MODEL=inception/mercury-2
    ports:
      - "8000:8000"
    volumes:
      - "$PWD/app:/app"
      - sqlite_data:/app/data
    command: "chainlit run app.py --host 0.0.0.0"

volumes:
  redis_data:
  sqlite_data:
